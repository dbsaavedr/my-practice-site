<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DutchmanGrill | Contact</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="index.html">
        <img src="images/DutchmanGrillLogo.png"/></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <a class="btn btn-primary" href="contact.html">Directions</a>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Contact Us</h1>
      <div class="contact-grid">
        <article class="card">
          <div class="card-body">
            <h2>Contact Us</h2>
            <p>3300 Bayport Blvd<br />Seabrook, TX 77586</p>
            <p>(281) 942-9024</p>
            <p>Mon–Thu: 11am–9pm<br />Fri–Sat: 11am–10pm<br />Sun: 12pm–8pm</p>
          </div>
        </article>

      <form 
        class="contact-form"
        action="https://formspree.io/f/xrerpjev"
        method="POST"
        >
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required />
        
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Your email" required />
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="How can we help?" required></textarea>
        
        <button type="submit" class="btn btn-primary form-btn">Send Message</button>
      </form>
  
    <section class="location-section">
      <div class="container">
        <h2>Visit Us</h2>
        <p>Come visit Dutchman Grill & Oyster Bar.</p>
        
        <div class="map-wrap">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1545.6024593723885!2d-95.02870795282331!3d29.58158240261251!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x863f62370a43b23b%3A0xb3c2cdd83831083f!2s3300%20Bayport%20Blvd%2C%20Seabrook%2C%20TX%2077586!5e0!3m2!1sen!2sus!4v1776379672207!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">        
      </iframe>
      </div>
      </div>
    </section>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Dutchman Grill & Oyster Bar</p>
    </div>
  </footer>
</body>
</html>
